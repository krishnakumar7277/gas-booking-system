<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="sidebar">
  <h2>GasBook Admin</h2>
  <a href="#">Dashboard</a>
  <a href="#">Bookings</a>
  <a href="#">Users</a>
  <a href="#" onclick="adminLogout()">Logout</a>
</div>

<div class="main">
  <div class="topbar">
    <h1>Admin Dashboard</h1>
    <button onclick="adminLogout()">Logout</button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Total Users</h3>
      <p id="totalUsers">0</p>
    </div>
    <div class="card">
      <h3>Total Bookings</h3>
      <p id="totalBookings">0</p>
    </div>
    <div class="card">
      <h3>Pending</h3>
      <p id="pendingBookings">0</p>
    </div>
    <div class="card">
      <h3>Delivered</h3>
      <p id="deliveredBookings">0</p>
    </div>
  </div>

  <div class="section">
    <h2>All Bookings</h2>
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Phone</th>
          <th>Cylinder</th>
          <th>Qty</th>
          <th>Payment</th>
          <th>Booking Status</th>
          <th>Payment Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="adminBookingTable"></tbody>
    </table>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
