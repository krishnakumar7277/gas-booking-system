<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <div class="form-box">
    <div class="form-top">
      <div class="icon-circle">🔐</div>
      <h1>Reset Password</h1>
      <p>Recover your GasBook account securely</p>
    </div>

    <div class="form-content">
      <h2>Forgot Password?</h2>
      <p class="subtitle">Enter your email to receive OTP</p>

      <div class="input-group">
        <span>📧</span>
        <input type="email" id="email" placeholder="Enter your registered email">
      </div>

      <button class="form-btn" onclick="sendOtp()">Send OTP</button>

      <div class="divider"><span>VERIFY</span></div>

      <div class="input-group">
        <span>🔢</span>
        <input type="text" id="otp" placeholder="Enter OTP">
      </div>

      <div class="input-group">
        <span>🔒</span>
        <input type="password" id="newPassword" placeholder="Enter new password">
      </div>

      <button class="form-btn" onclick="resetPassword()">Reset Password</button>

      <div class="link">
        <a href="login.html">Back to Login</a>
      </div>

      <div class="note">📩 OTP is valid for 10 minutes</div>
    </div>
  </div>
</div>

<script src="js/forgot.js"></script>
</body>
</html>
